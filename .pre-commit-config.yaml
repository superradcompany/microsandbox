default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: trailing-whitespace
        exclude: ^vendor/
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: [-x]
        files: ^scripts/.*\.sh$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: apt-common-regression
        name: apt common regression
        entry: bash scripts/tests/test-apt-common.sh
        language: system
        pass_filenames: false
        files: ^scripts/(lib/apt-common\.sh|tests/test-apt-common\.sh|.*\.sh)$
      - id: workflow-regressions
        name: workflow regression checks
        entry: python scripts/tests/test-workflows.py
        language: python
        additional_dependencies: [PyYAML==6.0.2]
        pass_filenames: false
        files: ^(\.github/workflows/.*\.ya?ml|scripts/tests/test-workflows\.py)$
      - id: cargo-fmt-workspace
        name: cargo fmt (workspace)
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        files: \.(rs|toml)$
      - id: cargo-clippy-workspace
        name: cargo clippy (workspace)
        entry: bash -lc 'CI=true cargo clippy --workspace -- -D warnings'
        language: system
        pass_filenames: false
        files: \.(rs|toml)$
      - id: cargo-fmt-agentd
        name: cargo fmt (agentd)
        entry: cargo fmt --manifest-path crates/agentd/Cargo.toml -- --check
        language: system
        pass_filenames: false
        files: \.(rs|toml)$
      - id: cargo-clippy-agentd
        name: cargo clippy (agentd)
        entry: cargo clippy --manifest-path crates/agentd/Cargo.toml -- -D warnings
        language: system
        pass_filenames: false
        files: \.(rs|toml)$
      - id: cargo-doc-workspace
        name: cargo doc (workspace)
        entry: bash -lc 'CI=true RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps'
        language: system
        pass_filenames: false
        files: \.(rs|toml)$
      - id: cargo-build-msb
        name: cargo build (msb)
        entry: bash -lc 'CI=true cargo build -p microsandbox-cli'
        language: system
        pass_filenames: false
        files: \.(rs|toml)$
      - id: python-sdk-ruff
        name: ruff check (Python SDK)
        entry: bash -lc 'cd sdk/python && uv run ruff check .'
        language: system
        pass_filenames: false
        files: ^sdk/python/.*\.py$
      - id: python-sdk-build
        name: cargo check (Python SDK)
        entry: bash -lc 'CI=true cargo check -p microsandbox-py'
        language: system
        pass_filenames: false
        files: ^sdk/python/.*\.(rs|toml)$
