<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 285" width="680" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1 L8 5 L2 9" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <title>Where curl goes from inside a sandbox</title>
  <text x="20" y="30" font-size="17" font-weight="600" fill="#e5e7eb">Where curl goes from inside a sandbox</text>

  <rect x="20" y="58" width="230" height="50" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="135" y="82" text-anchor="middle" font-size="14" fill="#e5e7eb">localhost:5432</text>
  <text x="135" y="100" text-anchor="middle" font-size="12" fill="#9ca3af">from inside the guest</text>
  <line x1="250" y1="83" x2="278" y2="83" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <rect x="280" y="58" width="150" height="50" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="355" y="82" text-anchor="middle" font-size="14" fill="#e5e7eb">guest loopback</text>
  <text x="355" y="100" text-anchor="middle" font-size="12" fill="#9ca3af">interface lo</text>
  <line x1="430" y1="83" x2="453" y2="83" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <rect x="455" y="58" width="205" height="50" rx="6" fill="#1d9e75" fill-opacity="0.1" stroke="#1d9e75" stroke-opacity="0.5" stroke-width="1"/>
  <text x="557" y="82" text-anchor="middle" font-size="14" fill="#5dcaa5">stays in the guest</text>
  <text x="557" y="100" text-anchor="middle" font-size="12" fill="#9ca3af">never reaches host</text>

  <rect x="20" y="128" width="230" height="50" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="135" y="152" text-anchor="middle" font-size="14" fill="#e5e7eb">host.microsandbox.internal</text>
  <text x="135" y="170" text-anchor="middle" font-size="12" fill="#9ca3af">the host alias</text>
  <line x1="250" y1="153" x2="278" y2="153" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <rect x="280" y="128" width="150" height="50" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="355" y="152" text-anchor="middle" font-size="14" fill="#e5e7eb">the host machine</text>
  <text x="355" y="170" text-anchor="middle" font-size="12" fill="#9ca3af">host's localhost</text>
  <line x1="430" y1="153" x2="453" y2="153" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <rect x="455" y="128" width="205" height="50" rx="6" fill="#d85a30" fill-opacity="0.1" stroke="#d85a30" stroke-opacity="0.5" stroke-width="1"/>
  <text x="557" y="152" text-anchor="middle" font-size="14" fill="#f0997b">dropped at gateway</text>
  <text x="557" y="170" text-anchor="middle" font-size="12" fill="#9ca3af">host group denied</text>

  <rect x="20" y="198" width="230" height="50" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="135" y="222" text-anchor="middle" font-size="14" fill="#e5e7eb">192.168.1.10</text>
  <text x="135" y="240" text-anchor="middle" font-size="12" fill="#9ca3af">a LAN address</text>
  <line x1="250" y1="223" x2="278" y2="223" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <rect x="280" y="198" width="150" height="50" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="355" y="222" text-anchor="middle" font-size="14" fill="#e5e7eb">local network</text>
  <text x="355" y="240" text-anchor="middle" font-size="12" fill="#9ca3af">private range</text>
  <line x1="430" y1="223" x2="453" y2="223" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <rect x="455" y="198" width="205" height="50" rx="6" fill="#d85a30" fill-opacity="0.1" stroke="#d85a30" stroke-opacity="0.5" stroke-width="1"/>
  <text x="557" y="222" text-anchor="middle" font-size="14" fill="#f0997b">dropped at gateway</text>
  <text x="557" y="240" text-anchor="middle" font-size="12" fill="#9ca3af">private group denied</text>

  <text x="20" y="272" font-size="12" fill="#9ca3af">Only the first is localhost, and it is the guest's own, not the host's.</text>
</svg>
