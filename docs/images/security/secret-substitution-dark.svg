<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 234" width="680" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1 L8 5 L2 9" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <title>A secret only becomes real at an allowed host</title>
  <text x="20" y="30" font-size="17" font-weight="600" fill="#e5e7eb">A secret only becomes real at an allowed host</text>

  <rect x="20" y="100" width="170" height="62" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="105" y="128" text-anchor="middle" font-size="14" fill="#e5e7eb">Guest request</text>
  <text x="105" y="146" text-anchor="middle" font-size="12" fill="#9ca3af">sends $MSB_TOKEN</text>

  <rect x="240" y="100" width="160" height="62" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="320" y="128" text-anchor="middle" font-size="14" fill="#e5e7eb">Host proxy</text>
  <text x="320" y="146" text-anchor="middle" font-size="12" fill="#9ca3af">intercepted TLS</text>

  <line x1="190" y1="131" x2="238" y2="131" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>

  <rect x="480" y="44" width="180" height="60" rx="6" fill="#1d9e75" fill-opacity="0.1" stroke="#1d9e75" stroke-opacity="0.5" stroke-width="1"/>
  <text x="570" y="70" text-anchor="middle" font-size="14" fill="#5dcaa5">api.example.com</text>
  <text x="570" y="88" text-anchor="middle" font-size="12" fill="#9ca3af">gets the real value</text>

  <rect x="480" y="158" width="180" height="60" rx="6" fill="#d85a30" fill-opacity="0.1" stroke="#d85a30" stroke-opacity="0.5" stroke-width="1"/>
  <text x="570" y="184" text-anchor="middle" font-size="14" fill="#f0997b">evil.com</text>
  <text x="570" y="202" text-anchor="middle" font-size="12" fill="#9ca3af">gets the placeholder</text>

  <line x1="400" y1="116" x2="478" y2="74" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <line x1="400" y1="146" x2="478" y2="188" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="440" y="86" text-anchor="middle" font-size="12" fill="#9ca3af">allowed host</text>
  <text x="440" y="182" text-anchor="middle" font-size="12" fill="#9ca3af">other host</text>
</svg>
