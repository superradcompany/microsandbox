<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Trust boundary: the hypervisor mediates every guest interaction</title>
  <text x="40" y="34" font-size="17" font-weight="600" fill="#e5e7eb">Trust boundary: the hypervisor mediates every guest interaction</text>
  <text x="340" y="92" text-anchor="middle" font-size="13" fill="#9ca3af">Hypervisor · KVM / HVF</text>

  <rect x="40" y="70" width="200" height="300" rx="10" fill="#d85a30" fill-opacity="0.07" stroke="#d85a30" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="140" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#f0997b">Guest (untrusted)</text>
  <rect x="440" y="70" width="200" height="300" rx="10" fill="#1d9e75" fill-opacity="0.07" stroke="#1d9e75" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="540" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#5dcaa5">Host (trusted)</text>

  <rect x="58" y="112" width="164" height="56" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="140" y="136" text-anchor="middle" font-size="14" fill="#e5e7eb">Workload code</text>
  <text x="140" y="154" text-anchor="middle" font-size="12" fill="#9ca3af">untrusted program</text>
  <rect x="58" y="182" width="164" height="56" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="140" y="206" text-anchor="middle" font-size="14" fill="#e5e7eb">agentd</text>
  <text x="140" y="224" text-anchor="middle" font-size="12" fill="#9ca3af">PID 1 · runs as root</text>
  <rect x="58" y="252" width="164" height="56" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="140" y="276" text-anchor="middle" font-size="14" fill="#e5e7eb">Guest Linux kernel</text>
  <text x="140" y="294" text-anchor="middle" font-size="12" fill="#9ca3af">from libkrunfw</text>

  <rect x="458" y="112" width="164" height="46" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="540" y="132" text-anchor="middle" font-size="14" fill="#e5e7eb">msb process</text>
  <text x="540" y="148" text-anchor="middle" font-size="12" fill="#9ca3af">embeds the VMM</text>
  <rect x="458" y="170" width="164" height="46" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="540" y="190" text-anchor="middle" font-size="14" fill="#e5e7eb">Network stack</text>
  <text x="540" y="206" text-anchor="middle" font-size="12" fill="#9ca3af">policy + smoltcp</text>
  <rect x="458" y="228" width="164" height="46" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="540" y="248" text-anchor="middle" font-size="14" fill="#e5e7eb">Secret injection</text>
  <text x="540" y="264" text-anchor="middle" font-size="12" fill="#9ca3af">real values stay here</text>
  <rect x="458" y="286" width="164" height="46" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="540" y="306" text-anchor="middle" font-size="14" fill="#e5e7eb">Filesystem broker</text>
  <text x="540" y="322" text-anchor="middle" font-size="12" fill="#9ca3af">virtiofs + images</text>

  <rect x="282" y="116" width="116" height="46" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
  <text x="340" y="136" text-anchor="middle" font-size="14" fill="#e5e7eb">Control</text>
  <text x="340" y="152" text-anchor="middle" font-size="12" fill="#9ca3af">virtio-console</text>
