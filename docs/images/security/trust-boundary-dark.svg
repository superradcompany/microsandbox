  <text x="340" y="256" text-anchor="middle" font-size="14" fill="#e5e7eb">Files</text>
  <text x="340" y="272" text-anchor="middle" font-size="12" fill="#9ca3af">virtiofs</text>
  <rect x="282" y="296" width="116" height="46" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
  <text x="340" y="316" text-anchor="middle" font-size="14" fill="#e5e7eb">Disks</text>
  <text x="340" y="332" text-anchor="middle" font-size="12" fill="#9ca3af">virtio-blk</text>

  <line x1="240" y1="139" x2="282" y2="139" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="240" y1="199" x2="282" y2="199" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="240" y1="259" x2="282" y2="259" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="240" y1="319" x2="282" y2="319" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="398" y1="139" x2="440" y2="139" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="398" y1="199" x2="440" y2="199" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="398" y1="259" x2="440" y2="259" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="398" y1="319" x2="440" y2="319" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>

  <rect x="40" y="390" width="12" height="12" rx="3" fill="#d85a30" fill-opacity="0.18" stroke="#d85a30" stroke-opacity="0.6" stroke-width="1"/>
  <text x="58" y="400" font-size="12" fill="#9ca3af">untrusted</text>
  <rect x="150" y="390" width="12" height="12" rx="3" fill="#1d9e75" fill-opacity="0.18" stroke="#1d9e75" stroke-opacity="0.6" stroke-width="1"/>
  <text x="168" y="400" font-size="12" fill="#9ca3af">trusted control</text>
  <rect x="320" y="390" width="12" height="12" rx="3" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
  <text x="338" y="400" font-size="12" fill="#9ca3af">hypervisor-mediated channel</text>
