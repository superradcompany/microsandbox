<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 205" width="680" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1 L8 5 L2 9" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <title>The control channel is host-driven</title>
  <text x="40" y="34" font-size="17" font-weight="600" fill="#e5e7eb">The control channel is host-driven</text>

  <rect x="70" y="80" width="200" height="70" rx="8" fill="#1d9e75" fill-opacity="0.07" stroke="#1d9e75" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="170" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#5dcaa5">Host</text>
  <text x="170" y="132" text-anchor="middle" font-size="12" fill="#9ca3af">your app or msb</text>

  <rect x="410" y="80" width="200" height="70" rx="8" fill="#d85a30" fill-opacity="0.07" stroke="#d85a30" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="510" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#f0997b">agentd</text>
  <text x="510" y="132" text-anchor="middle" font-size="12" fill="#9ca3af">inside the guest</text>

  <text x="340" y="98" text-anchor="middle" font-size="12" fill="#9ca3af">requests</text>
  <line x1="272" y1="106" x2="406" y2="106" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <line x1="408" y1="128" x2="274" y2="128" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="340" y="146" text-anchor="middle" font-size="12" fill="#9ca3af">responses</text>

  <text x="340" y="186" text-anchor="middle" font-size="13" fill="#9ca3af">The host drives every action. The guest only answers, never the reverse.</text>
</svg>
