name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LIBKRUNFW_VERSION: "5.2.1"
  LIBKRUNFW_ABI: "5"

jobs:
  # ---------------------------------------------------------------------------
  # Lint workflow and packaging tooling
  # ---------------------------------------------------------------------------
  tooling-lint:
    name: Tooling Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install workflow and shell lint dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-yaml shellcheck

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run shared packaging helper regression test
        run: bash scripts/tests/test-apt-common.sh

      - name: Run workflow structure regression test
        run: python3 scripts/tests/test-workflows.py

      - name: Lint shell scripts
        run: PATH="$HOME/go/bin:$PATH" shellcheck -x scripts/*.sh scripts/lib/*.sh scripts/tests/*.sh

      - name: Lint GitHub Actions workflows
        run: PATH="$HOME/go/bin:$PATH" actionlint

  # ---------------------------------------------------------------------------
  # Build kernel.c on Linux for macOS libkrunfw linking
  # ---------------------------------------------------------------------------
  build-kernel:
    name: Build kernel.c (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache kernel.c
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: vendor/libkrunfw/kernel.c
          key: kernel-c-aarch64-${{ hashFiles('vendor/libkrunfw/**') }}

      - name: Install kernel build deps
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev gcc make flex bison libelf-dev bc python3-pyelftools

      - name: Build kernel.c
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          cd vendor/libkrunfw
          make -j$(nproc)

      - name: Upload kernel.c
        uses: actions/upload-artifact@v4
        with:
          name: kernel-c-aarch64
          path: vendor/libkrunfw/kernel.c

  # ---------------------------------------------------------------------------
  # Build agentd on Linux for macOS packaging
  # ---------------------------------------------------------------------------
  build-agentd-aarch64:
    name: Build agentd (aarch64-linux-musl)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install agentd build deps
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build agentd
        run: |
          rustup target add --toolchain stable aarch64-unknown-linux-musl
          cargo +stable build --release --manifest-path crates/agentd/Cargo.toml --target aarch64-unknown-linux-musl
          mkdir -p build
          cp crates/agentd/target/aarch64-unknown-linux-musl/release/agentd build/agentd

      - name: Upload agentd
        uses: actions/upload-artifact@v4
        with:
          name: agentd-aarch64-linux-musl
          path: build/agentd

  # ---------------------------------------------------------------------------
  # Check
  # ---------------------------------------------------------------------------
  check:
    name: Check (${{ matrix.target }})
    needs: [tooling-lint, build-kernel, build-agentd-aarch64]
    if: always()
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            arch: x86_64
            os: linux
            agentd_target: x86_64-unknown-linux-musl
            libkrunfw_file: libkrunfw.so.5.2.1
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
            os: linux
            agentd_target: aarch64-unknown-linux-musl
            libkrunfw_file: libkrunfw.so.5.2.1
          - target: darwin-aarch64
            runner: macos-14
            arch: aarch64
            os: darwin
            libkrunfw_file: libkrunfw.5.dylib

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # -- Linux build deps --
      - name: Install build deps (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools libcap-ng-dev gcc make flex bison libelf-dev bc python3-pyelftools libdbus-1-dev

      # -- agentd (Linux: native musl) --
      - name: Build agentd (musl)
        if: matrix.os == 'linux'
        run: |
          rustup target add --toolchain stable ${{ matrix.agentd_target }}
          cargo +stable build --release --manifest-path crates/agentd/Cargo.toml --target ${{ matrix.agentd_target }}
          mkdir -p build
          cp crates/agentd/target/${{ matrix.agentd_target }}/release/agentd build/agentd

      # -- agentd (macOS: download prebuilt Linux artifact) --
      - name: Download agentd (macOS)
        if: matrix.os == 'darwin'
        uses: actions/download-artifact@v4
        with:
          name: agentd-aarch64-linux-musl
          path: build/

      # -- libkrunfw (cached) --
      - name: Cache libkrunfw
        id: cache-libkrunfw
        uses: actions/cache@v4
        with:
          path: build/libkrunfw*
          key: libkrunfw-${{ matrix.target }}-${{ hashFiles('vendor/libkrunfw/**') }}

      - name: Build libkrunfw (Linux)
        if: steps.cache-libkrunfw.outputs.cache-hit != 'true' && matrix.os == 'linux'
        run: |
          cd vendor/libkrunfw
          make -j$(nproc)
          cd ../..
          mkdir -p build
          cp vendor/libkrunfw/libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} build/
          cd build
          ln -sf libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} libkrunfw.so.${{ env.LIBKRUNFW_ABI }}
          ln -sf libkrunfw.so.${{ env.LIBKRUNFW_ABI }} libkrunfw.so

      - name: Download kernel.c (macOS)
        if: steps.cache-libkrunfw.outputs.cache-hit != 'true' && matrix.os == 'darwin'
        uses: actions/download-artifact@v4
        with:
          name: kernel-c-aarch64
          path: vendor/libkrunfw/

      - name: Build libkrunfw (macOS)
        if: steps.cache-libkrunfw.outputs.cache-hit != 'true' && matrix.os == 'darwin'
        run: |
          cd vendor/libkrunfw
          cc -fPIC -DABI_VERSION=${{ env.LIBKRUNFW_ABI }} -shared -o libkrunfw.${{ env.LIBKRUNFW_ABI }}.dylib kernel.c
          cd ../..
          mkdir -p build
          cp vendor/libkrunfw/libkrunfw.${{ env.LIBKRUNFW_ABI }}.dylib build/
          cd build
          ln -sf libkrunfw.${{ env.LIBKRUNFW_ABI }}.dylib libkrunfw.dylib

      - name: Build msb
        run: |
          cargo build --release --no-default-features --features net -p microsandbox-cli
          mkdir -p build
          cp target/release/msb build/msb

      - name: Codesign msb (macOS)
        if: matrix.os == 'darwin'
        run: codesign --entitlements msb-entitlements.plist --force -s - build/msb

      # -- Checks (workspace) --
      - name: Format
        run: cargo +stable fmt --all -- --check

      - name: Clippy
        run: cargo +stable clippy --workspace -- -D warnings

      - name: Docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo +stable doc --workspace --no-deps

      # -- Checks (agentd — excluded from workspace, Linux-only) --
      - name: Format agentd
        if: matrix.os == 'linux'
        run: cargo +stable fmt --manifest-path crates/agentd/Cargo.toml -- --check

      - name: Clippy agentd
        if: matrix.os == 'linux'
        run: cargo +stable clippy --manifest-path crates/agentd/Cargo.toml --target ${{ matrix.agentd_target }} -- -D warnings

      # -- Checks (Node SDK) --
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Node SDK
        working-directory: sdk/node-ts
        run: npm install && npm run build

      # -- Checks (Python SDK) --
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "sdk/python/uv.lock"

      - name: Sync Python dev environment
        working-directory: sdk/python
        run: uv sync --group dev

      - name: Stage runtime bundle (Python SDK)
        run: |
          mkdir -p sdk/python/microsandbox/_bundled/bin
          mkdir -p sdk/python/microsandbox/_bundled/lib
          cp build/msb sdk/python/microsandbox/_bundled/bin/
          cp build/${{ matrix.libkrunfw_file }} sdk/python/microsandbox/_bundled/lib/
          cd sdk/python/microsandbox/_bundled/lib
          if [ "${{ matrix.os }}" = "darwin" ]; then
            ln -sf ${{ matrix.libkrunfw_file }} libkrunfw.dylib
          else
            ln -sf ${{ matrix.libkrunfw_file }} libkrunfw.so.${{ env.LIBKRUNFW_ABI }}
            ln -sf libkrunfw.so.${{ env.LIBKRUNFW_ABI }} libkrunfw.so
          fi

      - name: Build Python SDK (editable)
        working-directory: sdk/python
        run: uv run maturin develop --release

      - name: Lint Python SDK (ruff)
        working-directory: sdk/python
        run: uv run ruff check .

      - name: Sanity wheel build (Python SDK)
        working-directory: sdk/python
        run: uv build --wheel

      # -- Upload artifacts (linux-x86_64 only, for SDK smoke tests) --
      - name: Upload build artifacts
        if: matrix.target == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: msb-linux-x86_64
          path: build/

      - name: Upload Node SDK artifacts
        if: matrix.target == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: node-sdk-linux-x86_64
          path: |
            sdk/node-ts/index.cjs
            sdk/node-ts/index.mjs
            sdk/node-ts/index.d.cts
            sdk/node-ts/index.d.ts
            sdk/node-ts/postinstall.js
            sdk/node-ts/microsandbox.*.node
            sdk/node-ts/package.json
            sdk/node-ts/package-lock.json
            sdk/node-ts/tests/
            sdk/node-ts/vitest.config.ts

      # -- Checks (MCP server) --
      - name: Build MCP server
        working-directory: mcp
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies.microsandbox = 'file:../sdk/node-ts';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --no-package-lock --ignore-scripts
          npm run build

  # ---------------------------------------------------------------------------
  # Validate APT packages and repository
  # ---------------------------------------------------------------------------
  apt-package-test:
    name: APT Package Validation (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            arch: x86_64
            deb_arch: amd64
            upload_kvm_repo: true
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
            deb_arch: arm64
            upload_kvm_repo: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install APT packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils lintian gnupg

      - name: Build baseline APT artifacts
        run: |
          bash scripts/build-apt-baseline-artifacts.sh \
            --output-dir build/apt/${{ matrix.arch }}

      - name: Build and validate .deb packages
        run: |
          VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"

          bash scripts/package-deb.sh \
            --arch "${{ matrix.arch }}" \
            --version "$VERSION" \
            --revision 1 \
            --msb build/apt/${{ matrix.arch }}/msb \
            --libkrunfw build/apt/${{ matrix.arch }}/libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} \
            --output-dir dist/v1

          bash scripts/package-deb.sh \
            --arch "${{ matrix.arch }}" \
            --version "$VERSION" \
            --revision 2 \
            --msb build/apt/${{ matrix.arch }}/msb \
            --libkrunfw build/apt/${{ matrix.arch }}/libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} \
            --output-dir dist/v2

          bash scripts/validate-deb.sh \
            --deb dist/v1/microsandbox_*_${{ matrix.deb_arch }}.deb \
            --arch "${{ matrix.deb_arch }}" \
            --version "$VERSION" \
            --revision 1

          bash scripts/validate-deb.sh \
            --deb dist/v2/microsandbox_*_${{ matrix.deb_arch }}.deb \
            --arch "${{ matrix.deb_arch }}" \
            --version "$VERSION" \
            --revision 2

      - name: Build signed test repositories
        env:
          GNUPGHOME: ${{ runner.temp }}/apt-gnupg
        run: |
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          GOOD_KEY_ID="$(bash scripts/generate-apt-test-key.sh --gnupg-home "$GNUPGHOME")"
          BAD_KEY_ID="$(bash scripts/generate-apt-test-key.sh \
            --gnupg-home "$GNUPGHOME" \
            --name-real "Microsandbox Wrong Repository" \
            --name-email "wrong@microsandbox.dev")"

          bash scripts/build-apt-repo.sh \
            --input-dir dist/v1 \
            --output-dir apt-repo-v1 \
            --gpg-key-id "$GOOD_KEY_ID"

          bash scripts/build-apt-repo.sh \
            --input-dir dist/v2 \
            --output-dir apt-repo-v2 \
            --gpg-key-id "$GOOD_KEY_ID"

          gpg --batch --yes --output wrong-repo-keyring.gpg --export "$BAD_KEY_ID"

      - name: Test APT install and upgrade in containers
        run: |
          bash scripts/test-apt-repo.sh \
            --repo-v1 apt-repo-v1 \
            --repo-v2 apt-repo-v2 \
            --keyring apt-repo-v1/microsandbox-archive-keyring.gpg \
            --bad-keyring wrong-repo-keyring.gpg

      - name: Upload signed APT repository artifact
        if: matrix.upload_kvm_repo
        uses: actions/upload-artifact@v4
        with:
          name: apt-repo-v1-${{ matrix.target }}
          path: apt-repo-v1/


  # ---------------------------------------------------------------------------
  # Node.js SDK smoke tests (requires KVM)
  # ---------------------------------------------------------------------------
  node-sdk-test:
    name: Node.js SDK Tests
    needs: check
    runs-on: self-hosted-ubuntu-2404-x64
    steps:
      - name: Clean workspace
        run: |
          rm -rf "${{ github.workspace }}"/{sdk,build}
          rm -rf ~/.microsandbox

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # -- Download pre-built artifacts --
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: msb-linux-x86_64
          path: build/

      - name: Download Node SDK artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-sdk-linux-x86_64
          path: sdk/node-ts/

      # -- Install msb + libkrunfw --
      - name: Install msb
        run: |
          rm -f ~/.microsandbox/db/microsandbox.db
          chmod +x build/msb
          mkdir -p ~/.microsandbox/bin ~/.microsandbox/lib
          install -m755 build/msb ~/.microsandbox/bin/msb
          install -m644 build/libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} ~/.microsandbox/lib/
          ln -sf libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} ~/.microsandbox/lib/libkrunfw.so.${{ env.LIBKRUNFW_ABI }}
          ln -sf libkrunfw.so.${{ env.LIBKRUNFW_ABI }} ~/.microsandbox/lib/libkrunfw.so

      # -- Install deps & run tests --
      - name: Install Node.js dependencies
        working-directory: sdk/node-ts
        run: npm install --ignore-scripts

      - name: Run SDK smoke tests
        working-directory: sdk/node-ts
        run: |
          export PATH="$HOME/.microsandbox/bin:$PATH"
          export LD_LIBRARY_PATH="${{ github.workspace }}/build:$HOME/.microsandbox/lib"
          npm test

  # ---------------------------------------------------------------------------
  # APT smoke tests (requires KVM)
  # ---------------------------------------------------------------------------
  apt-kvm-smoke:
    name: APT KVM Smoke Test
    needs: apt-package-test
    runs-on: self-hosted-ubuntu-2404-x64
    steps:
      - uses: actions/checkout@v4

      - name: Clean workspace
        run: |
          rm -rf "${{ github.workspace }}"/apt-repo
          rm -rf ~/.microsandbox
          sudo apt-get remove -y microsandbox || true
          sudo rm -f /etc/apt/sources.list.d/microsandbox.list
          sudo rm -f /usr/share/keyrings/microsandbox-archive-keyring.gpg

      - name: Download signed APT repository
        uses: actions/download-artifact@v4
        with:
          name: apt-repo-v1-linux-x86_64
          path: apt-repo/

      - name: Install and smoke test microsandbox from APT
        run: |
          bash scripts/apt-smoke-test.sh \
            --repo-url "file://${{ github.workspace }}/apt-repo" \
            --keyring-path "${{ github.workspace }}/apt-repo/microsandbox-archive-keyring.gpg"
