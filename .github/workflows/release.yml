name: 🚀 Release Packages & Binaries

on:
  push:
    branches: [ main ]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      trigger_release:
        description: 'Trigger release'
        type: boolean
        required: true
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.trigger_release == 'true' }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Setup release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check release status
        run: |
          echo "Release created: ${{ steps.release.outputs.releases_created }}"
          echo "Tag name: ${{ steps.release.outputs.tag_name }}"

  publish-sdk:
    needs: release-please
    if: ${{ needs.release-please.outputs['sdk/rust--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Publish SDK crate
        working-directory: sdk/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          echo "Publishing microsandbox SDK..."
          if cargo publish 2>&1 | tee publish.log; then
            echo "✓ Successfully published microsandbox SDK"
          elif grep -q "already exists on crates.io index" publish.log; then
            echo "⚠ microsandbox SDK already published, skipping..."
          else
            echo "✗ Failed to publish microsandbox SDK"
            cat publish.log
            exit 1
          fi

  build-and-package:
    name: Build and package (${{ matrix.release_target }})
    needs: release-please
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/v') || needs.release-please.outputs['--release_created'] == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            release_target: linux-x86_64
          - runner: ubuntu-24.04-arm
            release_target: linux-aarch64
          - runner: macos-14
            release_target: darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Determine release version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [ -n "${{ needs.release-please.outputs.tag_name }}" ]; then
            VERSION=${{ needs.release-please.outputs.tag_name }}
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "tag_name=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION#v}"

      - name: Build and package
        run: ./scripts/package_microsandbox.sh ${{ steps.version.outputs.version }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        if: steps.version.outputs.tag_name != ''
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          files: |
            build/microsandbox-*.tar.gz
            build/microsandbox-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
