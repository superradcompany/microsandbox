name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  LIBKRUNFW_VERSION: "5.2.1"
  LIBKRUNFW_ABI: "5"
  APT_REPO_DOMAIN: "apt.microsandbox.dev"

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Prepare release context from the successful Check workflow run
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Release Context
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.context.outputs.release_tag }}
      source_sha: ${{ steps.context.outputs.source_sha }}
    steps:
      - name: Resolve release tag
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
          RELEASE_TAG=""

          mkdir -p release-metadata
          if gh run download "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" \
            --name release-metadata \
            --dir release-metadata; then
            RELEASE_TAG="$(tr -d '\n' < release-metadata/release-tag.txt)"
          fi

          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$RELEASE_TAG" ]; then
            echo "Preparing release for $RELEASE_TAG from Check run ${{ github.event.workflow_run.id }}"
          else
            echo "Check succeeded without release metadata; skipping release workflow."
          fi

  # ---------------------------------------------------------------------------
  # Build kernel.c on Linux for macOS libkrunfw linking
  # ---------------------------------------------------------------------------
  build-kernel:
    name: Build kernel.c (aarch64)
    needs: prepare
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          submodules: true

      - name: Cache kernel.c
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: vendor/libkrunfw/kernel.c
          key: kernel-c-aarch64-${{ hashFiles('vendor/libkrunfw/**') }}

      - name: Install kernel build deps
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev gcc make flex bison libelf-dev bc python3-pyelftools

      - name: Build kernel.c
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          cd vendor/libkrunfw
          make -j$(nproc)

      - name: Upload kernel.c
        uses: actions/upload-artifact@v4
        with:
          name: kernel-c-aarch64
          path: vendor/libkrunfw/kernel.c

  # ---------------------------------------------------------------------------
  # Build agentd on Linux for macOS packaging
  # ---------------------------------------------------------------------------
  build-agentd-aarch64:
    name: Build agentd (aarch64-linux-musl)
    needs: prepare
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install agentd build deps
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build agentd
        run: |
          rustup target add aarch64-unknown-linux-musl
          cargo build --release --manifest-path crates/agentd/Cargo.toml --target aarch64-unknown-linux-musl
          mkdir -p build
          cp crates/agentd/target/aarch64-unknown-linux-musl/release/agentd build/agentd

      - name: Upload agentd
        uses: actions/upload-artifact@v4
        with:
          name: agentd-aarch64-linux-musl
          path: build/agentd

  # ---------------------------------------------------------------------------
  # Build release artifacts
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: [prepare, build-kernel, build-agentd-aarch64]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            arch: x86_64
            os: linux
            agentd_target: x86_64-unknown-linux-musl
            libkrunfw_file: libkrunfw.so.5.2.1
            libkrunfw_asset: libkrunfw-linux-x86_64.so
            napi_target: x86_64-unknown-linux-gnu
            node_file: microsandbox.linux-x64-gnu.node
            npm_dir: linux-x64-gnu
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
            os: linux
            agentd_target: aarch64-unknown-linux-musl
            libkrunfw_file: libkrunfw.so.5.2.1
            libkrunfw_asset: libkrunfw-linux-aarch64.so
            napi_target: aarch64-unknown-linux-gnu
            node_file: microsandbox.linux-arm64-gnu.node
            npm_dir: linux-arm64-gnu
          - target: darwin-aarch64
            runner: macos-14
            arch: aarch64
            os: darwin
            agentd_target: ""
            libkrunfw_file: libkrunfw.5.dylib
            libkrunfw_asset: libkrunfw-darwin-aarch64.dylib
            napi_target: aarch64-apple-darwin
            node_file: microsandbox.darwin-arm64.node
            npm_dir: darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # -- Linux build deps --
      - name: Install build deps (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools libcap-ng-dev gcc make flex bison libelf-dev bc python3-pyelftools libdbus-1-dev

      # -- agentd (Linux: native musl) --
      - name: Build agentd (musl)
        if: matrix.os == 'linux'
        run: |
          rustup target add ${{ matrix.agentd_target }}
          cargo build --release --manifest-path crates/agentd/Cargo.toml --target ${{ matrix.agentd_target }}
          mkdir -p build
          cp crates/agentd/target/${{ matrix.agentd_target }}/release/agentd build/agentd

      # -- agentd (macOS: download prebuilt Linux artifact) --
      - name: Download agentd (macOS)
        if: matrix.os == 'darwin'
        uses: actions/download-artifact@v4
        with:
          name: agentd-aarch64-linux-musl
          path: build/

      # -- libkrunfw (cached) --
      - name: Cache libkrunfw
        id: cache-libkrunfw
        uses: actions/cache@v4
        with:
          path: build/libkrunfw*
          key: libkrunfw-${{ matrix.target }}-${{ hashFiles('vendor/libkrunfw/**') }}

      - name: Build libkrunfw (Linux)
        if: steps.cache-libkrunfw.outputs.cache-hit != 'true' && matrix.os == 'linux'
        run: |
          cd vendor/libkrunfw
          make -j$(nproc)
          cd ../..
          mkdir -p build
          cp vendor/libkrunfw/libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} build/
          cd build
          ln -sf libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} libkrunfw.so.${{ env.LIBKRUNFW_ABI }}
          ln -sf libkrunfw.so.${{ env.LIBKRUNFW_ABI }} libkrunfw.so

      - name: Download kernel.c (macOS)
        if: steps.cache-libkrunfw.outputs.cache-hit != 'true' && matrix.os == 'darwin'
        uses: actions/download-artifact@v4
        with:
          name: kernel-c-aarch64
          path: vendor/libkrunfw/

      - name: Build libkrunfw (macOS)
        if: steps.cache-libkrunfw.outputs.cache-hit != 'true' && matrix.os == 'darwin'
        run: |
          cd vendor/libkrunfw
          cc -fPIC -DABI_VERSION=${{ env.LIBKRUNFW_ABI }} -shared -o libkrunfw.${{ env.LIBKRUNFW_ABI }}.dylib kernel.c
          cd ../..
          mkdir -p build
          cp vendor/libkrunfw/libkrunfw.${{ env.LIBKRUNFW_ABI }}.dylib build/
          cd build
          ln -sf libkrunfw.${{ env.LIBKRUNFW_ABI }}.dylib libkrunfw.dylib

      # -- msb --
      - name: Build msb
        run: |
          cargo build --release --no-default-features --features net -p microsandbox-cli
          mkdir -p build
          cp target/release/msb build/msb

      # -- macOS codesign --
      - name: Codesign msb
        if: matrix.os == 'darwin'
        run: codesign --entitlements msb-entitlements.plist --force -s - build/msb

      # -- Node SDK --
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Node SDK
        working-directory: sdk/node-ts
        run: |
          npm install
          npm run build -- --target ${{ matrix.napi_target }}

      - name: Upload Node SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-sdk-${{ matrix.npm_dir }}
          path: |
            sdk/node-ts/${{ matrix.node_file }}
            sdk/node-ts/index.cjs
            sdk/node-ts/index.d.cts

      # -- Python SDK --
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "sdk/python/uv.lock"

      - name: Stage runtime bundle (Python SDK)
        run: |
          mkdir -p sdk/python/microsandbox/_bundled/bin
          mkdir -p sdk/python/microsandbox/_bundled/lib
          cp build/msb sdk/python/microsandbox/_bundled/bin/
          cp build/${{ matrix.libkrunfw_file }} sdk/python/microsandbox/_bundled/lib/
          cd sdk/python/microsandbox/_bundled/lib
          if [ "${{ matrix.os }}" = "darwin" ]; then
            ln -sf ${{ matrix.libkrunfw_file }} libkrunfw.dylib
          else
            ln -sf ${{ matrix.libkrunfw_file }} libkrunfw.so.${{ env.LIBKRUNFW_ABI }}
            ln -sf libkrunfw.so.${{ env.LIBKRUNFW_ABI }} libkrunfw.so
          fi

      - name: Build Python wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sdk/python
          command: build
          args: --release --out dist
          manylinux: ${{ matrix.os == 'linux' && '2_28' || 'off' }}
          before-script-linux: dnf install -y dbus-devel libcap-ng-devel

      - name: Upload Python SDK wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-${{ matrix.target }}
          path: sdk/python/dist/*.whl

      # -- Stage release artifacts --
      - name: Stage artifacts
        run: |
          mkdir -p artifacts

          # Standalone msb
          cp build/msb artifacts/msb-${{ matrix.target }}

          # Standalone libkrunfw
          cp build/${{ matrix.libkrunfw_file }} artifacts/${{ matrix.libkrunfw_asset }}

          # Standalone agentd (Linux only — guest binary)
          if [ "${{ matrix.os }}" = "linux" ]; then
            cp build/agentd artifacts/agentd-${{ matrix.arch }}
          fi

          # Bundle: msb + libkrunfw
          tar -czf artifacts/microsandbox-${{ matrix.target }}.tar.gz \
            -C build msb ${{ matrix.libkrunfw_file }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: artifacts/

  # ---------------------------------------------------------------------------
  # Package Debian artifacts for release
  # ---------------------------------------------------------------------------
  apt-package:
    name: Package APT (${{ matrix.target }})
    needs: prepare
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            arch: x86_64
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Install APT packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Build baseline APT artifacts
        run: |
          bash scripts/build-apt-baseline-artifacts.sh \
            --output-dir build/apt/${{ matrix.arch }}

      - name: Package Debian archive
        run: |
          bash scripts/package-deb.sh \
            --arch "${{ matrix.arch }}" \
            --version "${{ needs.prepare.outputs.release_tag }}" \
            --revision 1 \
            --msb build/apt/${{ matrix.arch }}/msb \
            --libkrunfw build/apt/${{ matrix.arch }}/libkrunfw.so.${{ env.LIBKRUNFW_VERSION }} \
            --output-dir dist

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apt-${{ matrix.target }}
          path: dist/*.deb

  # ---------------------------------------------------------------------------
  # Build and sign the APT repository
  # ---------------------------------------------------------------------------
  apt-repo:
    name: Build APT Repository
    needs: [prepare, apt-package]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Install APT repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Download Debian packages
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-apt-*
          merge-multiple: true

      - name: Import APT signing key
        id: apt-key
        env:
          GNUPGHOME: ${{ runner.temp }}/apt-gnupg
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PRIVATE_KEY_BASE64: ${{ secrets.APT_GPG_PRIVATE_KEY_BASE64 }}
        run: |
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          KEY_ID="$(bash scripts/import-apt-signing-key.sh --gnupg-home "$GNUPGHOME")"
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"

      - name: Build signed APT repository
        env:
          GNUPGHOME: ${{ runner.temp }}/apt-gnupg
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          bash scripts/build-apt-repo.sh \
            --input-dir release-artifacts \
            --output-dir apt-repo \
            --gpg-key-id "${{ steps.apt-key.outputs.key_id }}"

          printf '%s\n' "${{ env.APT_REPO_DOMAIN }}" > apt-repo/CNAME

      - name: Upload APT repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-repo
          path: apt-repo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apt-repo/

  # ---------------------------------------------------------------------------
  # Publish APT repository to GitHub Pages
  # ---------------------------------------------------------------------------
  deploy-apt-repo:
    name: Deploy APT Repository
    needs: [prepare, apt-repo]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ---------------------------------------------------------------------------
  # Assemble: collect all artifacts, generate checksums, create GitHub release
  # ---------------------------------------------------------------------------
  assemble:
    name: Assemble Release
    needs: [prepare, build, apt-package, deploy-apt-repo]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Copy install script
        if: hashFiles('scripts/install.sh') != ''
        run: cp scripts/install.sh release-artifacts/install.sh

      - name: Generate checksums
        working-directory: release-artifacts
        run: sha256sum * > checksums.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.prepare.outputs.release_tag }}" \
            --title "${{ needs.prepare.outputs.release_tag }}" \
            --generate-notes \
            release-artifacts/*

  # ---------------------------------------------------------------------------
  # Publish Node SDK to npm
  # ---------------------------------------------------------------------------
  npm-publish:
    name: Publish npm packages
    needs: [prepare, build]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Node SDK artifacts
        uses: actions/download-artifact@v4
        with:
          path: node-artifacts
          pattern: node-sdk-*

      - name: Place binaries and update generated files
        run: |
          # Copy .node binaries into platform packages.
          cp node-artifacts/node-sdk-darwin-arm64/microsandbox.darwin-arm64.node sdk/node-ts/npm/darwin-arm64/
          cp node-artifacts/node-sdk-linux-x64-gnu/microsandbox.linux-x64-gnu.node sdk/node-ts/npm/linux-x64-gnu/
          cp node-artifacts/node-sdk-linux-arm64-gnu/microsandbox.linux-arm64-gnu.node sdk/node-ts/npm/linux-arm64-gnu/

          # Copy build-generated index.cjs and index.d.cts into root package
          # (use darwin-arm64 — all platforms produce identical JS/types).
          cp node-artifacts/node-sdk-darwin-arm64/index.cjs sdk/node-ts/index.cjs
          cp node-artifacts/node-sdk-darwin-arm64/index.d.cts sdk/node-ts/index.d.cts

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in darwin-arm64 linux-x64-gnu linux-arm64-gnu; do
            echo "Publishing @superradcompany/microsandbox-$dir..."
            cd sdk/node-ts/npm/$dir
            npm publish --access public
            cd ../../../..
          done

      - name: Wait for npm to index platform packages
        run: sleep 30

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: sdk/node-ts
        run: npm publish --access public

  # ---------------------------------------------------------------------------
  # Publish MCP server to npm
  # ---------------------------------------------------------------------------
  mcp-publish:
    name: Publish MCP server
    needs: [prepare, npm-publish]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build and publish MCP server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: mcp
        run: |
          rm package-lock.json
          npm install
          npm run build
          npm publish --access public

  # ---------------------------------------------------------------------------
  # Publish Rust crates to crates.io
  # ---------------------------------------------------------------------------
  crates-publish:
    name: Publish crates
    needs: [prepare, build]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in \
            microsandbox-utils \
            microsandbox-protocol \
            microsandbox-db \
            microsandbox-migration \
            microsandbox-image \
            microsandbox-filesystem \
            microsandbox-network \
            microsandbox-runtime \
            microsandbox \
            microsandbox-cli; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --no-verify
            sleep 60
          done

  # ---------------------------------------------------------------------------
  # Publish Python SDK to PyPI
  # ---------------------------------------------------------------------------
  pypi-publish:
    name: Publish Python SDK
    needs: [prepare, build]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/microsandbox
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - uses: astral-sh/setup-uv@v3

      - name: Download Python SDK wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-sdk-*
          merge-multiple: true

      - name: List wheels
        run: ls -lh dist/

      - name: Publish to PyPI
        run: uv publish dist/*.whl
